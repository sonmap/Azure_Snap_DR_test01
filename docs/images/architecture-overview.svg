<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#475569"/>
    </marker>
    <style>
      .title { font: 700 30px Arial, sans-serif; fill: #0f172a; }
      .h2 { font: 700 22px Arial, sans-serif; fill: #0f172a; }
      .text { font: 16px Arial, sans-serif; fill: #0f172a; }
      .small { font: 14px Arial, sans-serif; fill: #334155; }
      .box { stroke-width: 2; rx: 14; ry: 14; }
      .line { stroke: #475569; stroke-width: 3; fill: none; marker-end: url(#arrow); }
      .dash { stroke-dasharray: 10 8; }
    </style>
  </defs>

  <rect width="1600" height="900" fill="#ffffff"/>
  <text x="800" y="48" text-anchor="middle" class="title">Azure Snapshot Cold DR — Korea Central → Japan East</text>

  <rect x="40" y="100" width="690" height="720" fill="#f0fdf4" stroke="#16a34a" class="box"/>
  <text x="385" y="140" text-anchor="middle" class="h2">Korea Central — Primary</text>

  <rect x="870" y="100" width="690" height="720" fill="#fef2f2" stroke="#dc2626" class="box"/>
  <text x="1215" y="140" text-anchor="middle" class="h2">Japan East — Cold DR</text>

  <rect x="610" y="20" width="380" height="90" fill="#dbeafe" stroke="#2563eb" class="box"/>
  <text x="800" y="55" text-anchor="middle" class="h2">Azure Traffic Manager</text>
  <text x="800" y="82" text-anchor="middle" class="small">Priority: KRC Enabled / JPE Disabled</text>

  <rect x="95" y="190" width="250" height="80" fill="#dcfce7" stroke="#16a34a" class="box"/>
  <text x="220" y="220" text-anchor="middle" class="text">Static Public IP</text>
  <text x="220" y="246" text-anchor="middle" class="small">DNS label assigned</text>

  <rect x="425" y="190" width="250" height="80" fill="#dcfce7" stroke="#16a34a" class="box"/>
  <text x="550" y="220" text-anchor="middle" class="text">Public Load Balancer</text>
  <text x="550" y="246" text-anchor="middle" class="small">HTTP /health :8080</text>

  <rect x="260" y="340" width="290" height="125" fill="#fef3c7" stroke="#d97706" class="box"/>
  <text x="405" y="375" text-anchor="middle" class="h2">vm-app-krc-01</text>
  <text x="405" y="405" text-anchor="middle" class="text">Tomcat + MySQL</text>
  <text x="405" y="433" text-anchor="middle" class="small">systemd automatic startup</text>

  <rect x="90" y="520" width="250" height="80" fill="#fff7ed" stroke="#ea580c" class="box"/>
  <text x="215" y="554" text-anchor="middle" class="text">OS Managed Disk</text>
  <text x="215" y="580" text-anchor="middle" class="small">Ubuntu + Tomcat</text>

  <rect x="420" y="520" width="250" height="80" fill="#fff7ed" stroke="#ea580c" class="box"/>
  <text x="545" y="554" text-anchor="middle" class="text">Data Managed Disk</text>
  <text x="545" y="580" text-anchor="middle" class="small">/data/mysql</text>

  <rect x="90" y="660" width="250" height="105" fill="#ede9fe" stroke="#7c3aed" class="box"/>
  <text x="215" y="695" text-anchor="middle" class="text">Automation Runbook</text>
  <text x="215" y="722" text-anchor="middle" class="small">Stop → Snapshot → Start</text>
  <text x="215" y="747" text-anchor="middle" class="small">CopyStart to Japan</text>

  <rect x="420" y="660" width="250" height="105" fill="#f3e8ff" stroke="#9333ea" class="box"/>
  <text x="545" y="695" text-anchor="middle" class="text">Incremental Snapshots</text>
  <text x="545" y="722" text-anchor="middle" class="small">OS + DATA-LUN-0</text>
  <text x="545" y="747" text-anchor="middle" class="small">RecoverySet tags</text>

  <rect x="925" y="190" width="250" height="80" fill="#fee2e2" stroke="#dc2626" class="box"/>
  <text x="1050" y="220" text-anchor="middle" class="text">Static Public IP</text>
  <text x="1050" y="246" text-anchor="middle" class="small">Created in initial build</text>

  <rect x="1255" y="190" width="250" height="80" fill="#fee2e2" stroke="#dc2626" class="box"/>
  <text x="1380" y="220" text-anchor="middle" class="text">Public Load Balancer</text>
  <text x="1380" y="246" text-anchor="middle" class="small">Backend empty normally</text>

  <rect x="925" y="340" width="250" height="105" fill="#f3e8ff" stroke="#9333ea" class="box"/>
  <text x="1050" y="375" text-anchor="middle" class="text">Copied Snapshots</text>
  <text x="1050" y="402" text-anchor="middle" class="small">CompletionPercent = 100</text>
  <text x="1050" y="427" text-anchor="middle" class="small">No VM cost at normal time</text>

  <rect x="1255" y="340" width="250" height="105" fill="#ccfbf1" stroke="#0f766e" class="box"/>
  <text x="1380" y="375" text-anchor="middle" class="text">Terraform 30-dr</text>
  <text x="1380" y="402" text-anchor="middle" class="small">Snapshot → Disks → VM</text>
  <text x="1380" y="427" text-anchor="middle" class="small">Attach LB backend</text>

  <rect x="1090" y="520" width="290" height="125" fill="#fef3c7" stroke="#d97706" class="box"/>
  <text x="1235" y="555" text-anchor="middle" class="h2">vm-app-jpe-dr-01</text>
  <text x="1235" y="585" text-anchor="middle" class="text">Created only at failover</text>
  <text x="1235" y="613" text-anchor="middle" class="small">Mount → MySQL → Tomcat</text>

  <rect x="1090" y="690" width="290" height="80" fill="#ecfccb" stroke="#65a30d" class="box"/>
  <text x="1235" y="722" text-anchor="middle" class="text">Health Validation</text>
  <text x="1235" y="748" text-anchor="middle" class="small">Enable JPE only after HTTP 200</text>

  <line x1="345" y1="230" x2="425" y2="230" class="line"/>
  <line x1="550" y1="270" x2="440" y2="340" class="line"/>
  <line x1="405" y1="465" x2="215" y2="520" class="line"/>
  <line x1="405" y1="465" x2="545" y2="520" class="line"/>
  <line x1="340" y1="712" x2="420" y2="712" class="line"/>
  <line x1="545" y1="660" x2="1050" y2="445" class="line dash"/>
  <line x1="1175" y1="392" x2="1255" y2="392" class="line"/>
  <line x1="1380" y1="445" x2="1270" y2="520" class="line"/>
  <line x1="1235" y1="645" x2="1235" y2="690" class="line"/>
  <line x1="800" y1="110" x2="300" y2="190" class="line"/>
  <line x1="800" y1="110" x2="1050" y2="190" class="line dash"/>
  <path d="M1090,730 C900,730 900,120 800,110" class="line dash"/>
</svg>
